name: Terraform Checks

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Checks (skip input-required folders)
        run: |
          for dir in terraform-lab/day*; do
            echo "Checking $dir"

            # Skip day2 (requires tfvars input)
            if [[ "$dir" == *"day2"* ]]; then
              echo "Skipping $dir (requires input)"
              continue
            fi

            cd $dir

            terraform init
            terraform fmt -check
            terraform validate
            terraform plan

            cd - > /dev/null
          done